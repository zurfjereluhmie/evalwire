site_name: evalwire
site_description: Systematic evaluation of LangGraph nodes using Arize Phoenix experiments.
site_url: https://zurfjereluhmie.github.io/evalwire/
repo_url: https://github.com/zurfjereluhmie/evalwire
docs_dir: docs
site_dir: site

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  font:
    code: Cascadia Code
  palette:
    - scheme: default
      primary: white
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source

nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - Concepts: concepts.md
  - Guides:
      - Writing Custom Evaluators: guides/custom-evaluators.md
  - Configuration: configuration.md
  - Troubleshooting: troubleshooting.md
  - API Reference:
      - evalwire: api/index.md
      - Evaluators: api/evaluators.md
      - Uploader: api/uploader.md
      - Runner: api/runner.md
      - Observability: api/observability.md
      - Config: api/config.md
      - CLI: api/cli.md
      - LangGraph: api/langgraph.md
  - Changelog: changelog.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - toc:
      permalink: true
