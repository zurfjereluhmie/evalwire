[environment]
# The demo/ directory requires optional extras (langchain, langgraph, dotenv)
# that are not installed in the dev environment. Exclude it from type checking.
python-platform = "linux"

[src]
exclude = ["demo"]

[[overrides]]
# evalwire.langgraph and the async task tests import langgraph and langchain-core
# lazily (optional extras not installed in the dev environment).
include = ["src/evalwire/langgraph.py", "tests/test_task_async.py"]

[overrides.rules]
unresolved-import = "ignore"
