name: Docs

on:
  push:
    branches:
      - main

# Only one docs deployment runs at a time; cancel any in-progress run when a
# newer commit is pushed so the latest content always wins.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write   # needed to push to the gh-pages branch

jobs:
  deploy:
    name: Build & deploy MkDocs site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is not needed for a simple mkdocs gh-deploy, but
          # fetch-depth: 0 gives mkdocs-git-revision-date accurate dates if
          # you add that plugin later.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build & deploy to GitHub Pages
        run: uv run mkdocs gh-deploy --force --clean --verbose
