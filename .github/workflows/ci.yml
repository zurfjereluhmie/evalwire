name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint, format & typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint (ruff check)
        run: uv run ruff check src tests demo

      - name: Format (ruff format)
        run: uv run ruff format --check src tests demo

      - name: Typecheck (ty)
        run: uv run ty check

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Test with coverage
        run: uv run pytest tests/ -q --cov=evalwire --cov-report=term-missing --cov-fail-under=85

  test-integration:
    name: Integration tests (phoenix v${{ matrix.phoenix-major }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        phoenix-major: [13, 14, 15]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --group dev

      - name: Pin arize-phoenix to major ${{ matrix.phoenix-major }}
        run: |
          MAJOR=${{ matrix.phoenix-major }}
          NEXT=$((MAJOR + 1))
          if [ "$MAJOR" -lt 14 ]; then
            uv pip install "arize-phoenix>=${MAJOR},<${NEXT}" "arize-phoenix-evals<3.0" --prerelease=allow
          else
            uv pip install "arize-phoenix>=${MAJOR},<${NEXT}"
          fi

      - name: Run integration tests
        run: uv run pytest tests/ -q -m integration

  # https://github.com/marketplace/actions/alls-green#why
  ci-success: # This job does nothing and is only used for the branch protection
    name: CI Success
    if: always()
    needs:
      - lint
      - test
      - test-integration
      - docs-check
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          allowed-skips: docs-check
          jobs: ${{ toJSON(needs) }}

  docs-check:
    name: Docs build check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            docs:
              - docs/**
              - mkdocs.yml
              - src/**
              - .github/workflows/docs.yml

      - name: Install uv
        if: steps.filter.outputs.docs == 'true'
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        if: steps.filter.outputs.docs == 'true'
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install dependencies
        if: steps.filter.outputs.docs == 'true'
        run: uv sync --group dev

      - name: Build docs (dry run)
        if: steps.filter.outputs.docs == 'true'
        run: uv run mkdocs build --clean --strict
